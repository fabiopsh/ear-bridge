<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EarBridge</title>
    <script>
      // GitHub Pages SPA redirect: preserve the path in sessionStorage, then redirect to root
      var path = window.location.pathname;
      var base = '/ear-bridge';
      var redirectPath = path.startsWith(base) ? path.slice(base.length) : path;
      sessionStorage.setItem('spa_redirect', redirectPath + window.location.search + window.location.hash);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
